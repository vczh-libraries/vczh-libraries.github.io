};
  const article = {
  "index": true,
  "numberBeforeTitle": false,
  "topic": {
    "kind": "Topic",
    "title": "Remote Protocol Core Application",
    "content": [
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            A remote protocol core application is a normal GacUI application that calls SetupRemoteNativeController.\n            It becomes headless and is forced into hosted mode.\n            The core does not draw to an OS native window;\n            it sends JSON remote protocol packages through a vl::inter_process channel.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The standard C++ path is small:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Start a GuiRemoteProtocolNetworkChannelServer<TServerBase> over an INetworkProtocolServer implementation such as NamedPipeServer or HttpServer."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Connect the core to that server with GuiRemoteProtocolLocalChannelClient."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Wrap the core channel with GuiRemoteProtocolJsonChannelRenderer_Async and GuiRemoteProtocolCoreChannel."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Pass the protocol, usually after GuiRemoteProtocolFilter and GuiRemoteProtocolDomDiffConverter, to SetupRemoteNativeController."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The core client is expected to be registered as GacUIRemoteProtocolCoreClientId.\n            A renderer created by GuiRemoteProtocolChannelClient advertises GacUIRemoteProtocolChannelName.\n            GuiRemoteProtocolCoreChannel learns the renderer client id from the renderer's ControllerConnect event,\n            so user code does not need to route individual remote protocol messages.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            A compact named pipe setup looks like this:\n            "
          },
          {
            "kind": "Program",
            "code": "using namespace vl;\r\nusing namespace vl::presentation;\r\nusing namespace vl::presentation::remoteprotocol;\r\nusing namespace vl::presentation::remoteprotocol::channeling;\r\nusing namespace vl::presentation::remoteprotocol::repeatfiltering;\r\n\r\nclass NamedPipeRemoteCoreServer\r\n    : public GuiRemoteProtocolNetworkChannelServer<inter_process::NamedPipeServer>\r\n{\r\n    using Base = GuiRemoteProtocolNetworkChannelServer<inter_process::NamedPipeServer>;\r\n\r\n    EventObject rendererConnected;\r\n\r\npublic:\r\n    NamedPipeRemoteCoreServer(Ptr<glr::json::Parser> parser, const WString& pipeName)\r\n        : Base(parser, pipeName)\r\n    {\r\n        rendererConnected.CreateManualUnsignal(false);\r\n    }\r\n\r\n    void WaitForRenderer()\r\n    {\r\n        rendererConnected.Wait();\r\n    }\r\n\r\nprotected:\r\n    inter_process::WaitForClientResult OnClientConnected(\r\n        vint clientId,\r\n        const IJsonChannelClient::ChannelNameList& availableChannels,\r\n        IJsonChannelClient* localClient) override\r\n    {\r\n        if (localClient)\r\n        {\r\n            return inter_process::WaitForClientResult::Accept;\r\n        }\r\n\r\n        if (availableChannels.Contains(WString::Unmanaged(GacUIRemoteProtocolChannelName)))\r\n        {\r\n            rendererConnected.Signal();\r\n            return inter_process::WaitForClientResult::Accept;\r\n        }\r\n        return inter_process::WaitForClientResult::Reject;\r\n    }\r\n};\r\n\r\nvoid StartNamedPipeRemoteCore()\r\n{\r\n    auto jsonParser = Ptr(new glr::json::Parser);\r\n    NamedPipeRemoteCoreServer server(jsonParser, L\"GacUIRemoteProtocolNamedPipe\");\r\n    server.Start();\r\n\r\n    auto coreClient = Ptr(new GuiRemoteProtocolLocalChannelClient(jsonParser));\r\n    auto coreClientId = server.ConnectLocalClient(coreClient);\r\n    CHECK_ERROR(coreClientId == GacUIRemoteProtocolCoreClientId, L\"Failed to register the core client.\");\r\n\r\n    server.WaitForRenderer();\r\n\r\n    GuiRemoteProtocolJsonChannelRenderer_Async asyncChannel(coreClient->GetProtocolChannel());\r\n    GuiRemoteProtocolCoreChannel coreProtocol(\r\n        coreClient.Obj(),\r\n        &asyncChannel,\r\n        L\"MyRemoteCore.exe\",\r\n        asyncChannel.GetRemoteEventProcessor());\r\n\r\n    GuiRemoteProtocolFilter filteredProtocol(&coreProtocol);\r\n    GuiRemoteProtocolDomDiffConverter diffProtocol(&filteredProtocol);\r\n    SetupRemoteNativeController(&diffProtocol);\r\n\r\n    server.Stop();\r\n}",
            "language": "c++"
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            GuiMain still creates and runs GacUI windows.\n            If the UI throws while the remote server is alive,\n            send the error through IJsonLocalChannelServer::BroadcastError so the renderer stops instead of waiting for more packages.\n            A production server can also reject clients that do not offer GacUIRemoteProtocolChannelName,\n            disconnect previous renderers, or call GuiRemoteProtocolCoreChannel::DetachRenderer when replacing a renderer.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            See "
          },
          {
            "kind": "PageLink",
            "href": "https://github.com/vczh-libraries/GacUI/tree/master/Test/GacUISrc/RemotingTest_Core",
            "content": [
              {
                "kind": "Text",
                "text": "RemotingTest_Core"
              }
            ]
          },
          {
            "kind": "Text",
            "text": "\n            for the complete named pipe and HTTP implementation.\n        "
          }
        ]
      }
    ]
  }
};

<div id="MVC-ViewContainer"></div>
<script lang="javascript">
{
  const mvcModel = {
  "path": [
    "gacui",
    "modes",
    "remote_communication"
  ]
};
  const mvcViews = [
  {
    "targetObject": "MVC-ViewContainer",
    "viewName": "Gaclib-RootView"
  },
  {
    "targetObject": "rootViewContainer",
    "viewName": "Gaclib-DirectoryView"
  },
  {
    "targetObject": "directoryViewContainer",
    "viewName": "Gaclib-ArticleView"
  }
];
  const hrefPrefix = "/doc/current";
  const directoryInfo = {
  "subNodes": [
    {
      "icon": "-",
      "name": "GacUI",
      "selected": false,
      "path": [
        "gacui",
        "home"
      ],
      "subNodes": [
        {
          "icon": "-",
          "name": "Hosted Mode and Remote Protocol",
          "selected": false,
          "path": [
            "gacui",
            "modes",
            "home"
          ],
          "subNodes": [
            {
              "icon": " ",
              "name": "Remote Protocol Core Application",
              "selected": false,
              "path": [
                "gacui",
                "modes",
                "remote_core"
              ]
            },
            {
              "icon": " ",
              "name": "Remote Protocol Client Application",
              "selected": false,
              "path": [
                "gacui",
                "modes",
                "remote_client"
              ]
            },
            {
              "icon": " ",
              "name": "Remote Protocol Channel Layer",
              "selected": true,
              "path": [
                "gacui",
                "modes",
                "remote_communication"
              ]
            }
          ]
        }
      ]
    }
  ]
};
  const article = {
  "index": true,
  "numberBeforeTitle": false,
  "topic": {
    "kind": "Topic",
    "title": "Remote Protocol Channel Layer",
    "content": [
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            GacUI remote protocol channeling uses the vl::inter_process channel bridge and the INetworkProtocolConnection, INetworkProtocolCallback, INetworkProtocolClient and INetworkProtocolServer interfaces underneath.\n            The GacUI layer remains a rendering protocol between a headless core and a renderer.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The layers are:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "IGuiRemoteProtocol and IGuiRemoteEventProcessor: the strongly typed GacUI remote protocol."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "GuiRemoteProtocolCoreChannel and GuiRemoteProtocolRendererChannel: conversion between the strongly typed protocol and JSON channel packages."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "GuiRemoteProtocolNetworkChannelServer, GuiRemoteProtocolLocalChannelClient and GuiRemoteProtocolChannelClient: the vl::inter_process JSON channel bridge."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "NamedPipeServer, NamedPipeClient, HttpServer, HttpClient, or custom implementations of the INetworkProtocolConnection, INetworkProtocolCallback, INetworkProtocolClient and INetworkProtocolServer interfaces: the underlying data-transmission implementation."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The JSON channel package type is Ptr<glr::json::JsonNode>.\n            The remote protocol channel name is GacUIRemoteProtocolChannelName, whose value is GacUIRemoteProtocol.\n            The in-process core client should be assigned GacUIRemoteProtocolCoreClientId.\n            Renderer-side packages are sent to that core client id, and core-side packages are sent to the renderer client id learned from ControllerConnect.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            ChannelPackageInfo describes the remote protocol envelope:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "semantic: Message, Request, Response or Event."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "id: the request or response id, or -1 when the package does not need one."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "name: the generated remote protocol message, request, response or event name."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            JsonChannelPack and JsonChannelUnpack convert this envelope and the optional arguments node to and from a JSON object.\n            Application code normally does not call these functions unless it is logging, debugging or building a non-C++ renderer.\n        "
          }
        ]
      },
      {
        "kind": "Topic",
        "title": "What User Code Owns",
        "content": [
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                A normal C++ application configures the remote protocol channel at startup.\n                After GuiRemoteProtocolCoreChannel and GuiRemoteProtocolRendererChannel are connected,\n                the library routes individual remote protocol messages between the strongly typed protocol and JSON channel packages.\n            "
              }
            ]
          },
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                User code usually owns only:\n                "
              },
              {
                "kind": "List",
                "ordered": false,
                "items": [
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "A small server policy around GuiRemoteProtocolNetworkChannelServer, if the core needs to wait for a renderer, reject invalid clients, or replace a previous renderer."
                      }
                    ]
                  },
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "An underlying data-transmission implementation, represented by INetworkProtocolConnection, INetworkProtocolCallback, INetworkProtocolClient and INetworkProtocolServer."
                      }
                    ]
                  },
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "Optional renderer-side error handling by overriding GuiRemoteProtocolChannelClient::OnReadError, OnLocalError or OnDisconnected."
                      }
                    ]
                  }
                ]
              }
            ]
          },
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                GuiRemoteProtocolCoreChannel exposes BeforeWrite and BeforeOnRead.\n                GuiRemoteProtocolRendererChannel exposes the same events.\n                Use these events for tracing package flow or diagnosing mismatched renderer/core behavior.\n            "
              }
            ]
          }
        ]
      },
      {
        "kind": "Topic",
        "title": "Adding a Transport",
        "content": [
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                Add a new underlying data-transmission implementation below GacUI by implementing the vl::inter_process INetworkProtocolConnection, INetworkProtocolCallback, INetworkProtocolClient and INetworkProtocolServer interfaces.\n                The names say network protocol, but the contract is only asynchronous WString message exchange.\n                The implementation can be a pipe, socket, stdio stream, shared memory, DLL function calls, or any other mechanism that can satisfy INetworkProtocolConnection, INetworkProtocolCallback, INetworkProtocolClient and INetworkProtocolServer.\n                Then reuse the GacUI JSON channel classes.\n            "
              }
            ]
          },
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                The core side selects the INetworkProtocolServer implementation as the template argument:\n                "
              },
              {
                "kind": "Program",
                "code": "using MyRemoteCoreServer =\r\n    GuiRemoteProtocolNetworkChannelServer<MyTransportServer>;\r\n\r\nauto jsonParser = Ptr(new glr::json::Parser);\r\nMyRemoteCoreServer server(jsonParser, /* transport server constructor arguments */);\r\nserver.Start();\r\n\r\nauto coreClient = Ptr(new GuiRemoteProtocolLocalChannelClient(jsonParser));\r\nserver.ConnectLocalClient(coreClient);",
                "language": "c++"
              }
            ]
          },
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                The renderer side wraps an INetworkProtocolClient object:\n                "
              },
              {
                "kind": "Program",
                "code": "auto jsonParser = Ptr(new glr::json::Parser);\r\nauto networkClient = Ptr(new MyTransportClient(/* connection arguments */));\r\n\r\nGuiRemoteProtocolChannelClient channelClient(networkClient, jsonParser);\r\nchannelClient.WaitForServer();",
                "language": "c++"
              }
            ]
          },
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                The same channel setup shown in\n                "
              },
              {
                "kind": "PageLink",
                "href": "/gacui/modes/remote_core.html",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Remote Protocol Core Application"
                  }
                ]
              },
              {
                "kind": "Text",
                "text": " and\n                "
              },
              {
                "kind": "PageLink",
                "href": "/gacui/modes/remote_client.html",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Remote Protocol Client Application"
                  }
                ]
              },
              {
                "kind": "Text",
                "text": "\n                works after the transport object is connected.\n                See "
              },
              {
                "kind": "PageLink",
                "href": "/vlppos/using-inter-process.html",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Using Inter-Process Channels"
                  }
                ]
              },
              {
                "kind": "Text",
                "text": "\n                for the inter-process protocol and channel interface contracts.\n            "
              }
            ]
          }
        ]
      }
    ]
  }
};
  window["MVC-Resources.mvcModel"] = mvcModel;
  window["MVC-Resources.mvcViews"] = mvcViews;
  window["MVC-Resources.hrefPrefix"] = hrefPrefix;
  window["MVC-Resources.directoryInfo"] = directoryInfo;
  window["MVC-Resources.article"] = article;
  for (const view of mvcViews) {
    window[view.viewName].renderView(mvcModel, document.getElementById(view.targetObject));
  }
  const renderedScriptTags = document.getElementById("MVC-ViewContainer").getElementsByTagName("script");
  for (const scriptTag of renderedScriptTags) {
    eval(
      "(function(){" + scriptTag.innerHTML + "})()"
    );
  }
}
</script>

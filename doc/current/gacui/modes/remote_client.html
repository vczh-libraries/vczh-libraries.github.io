  const article = {
  "index": true,
  "numberBeforeTitle": false,
  "topic": {
    "kind": "Topic",
    "title": "Remote Protocol Client Application",
    "content": [
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            GuiRemoteRendererSingle is the standard C++ renderer for one remote GacUI core.\n            It implements IGuiRemoteProtocol,\n            renders to one INativeWindow,\n            and sends user input, window, screen, measuring, and automation events back to the core.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The renderer side does not implement a string channel anymore.\n            It only chooses a vl::inter_process transport client,\n            creates a GuiRemoteProtocolChannelClient,\n            and bridges that JSON channel to GuiRemoteRendererSingle.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            A compact named pipe renderer looks like this:\n            "
          },
          {
            "kind": "Program",
            "code": "using namespace vl;\r\nusing namespace vl::presentation;\r\nusing namespace vl::presentation::remoteprotocol;\r\nusing namespace vl::presentation::remoteprotocol::channeling;\r\nusing namespace vl::presentation::remote_renderer;\r\n\r\nGuiRemoteRendererSingle* remoteRenderer = nullptr;\r\nGuiRemoteProtocolAsyncJsonChannelRenderer* asyncChannel = nullptr;\r\n\r\nclass GuiMainInvoker : public IGuiRemoteProtocolAsyncRendererInvoker\r\n{\r\npublic:\r\n    void InvokeInMainThread(const Func<void()>& proc) override\r\n    {\r\n        GetApplication()->InvokeInMainThread(nullptr, proc);\r\n    }\r\n};\r\n\r\nvoid GuiMain()\r\n{\r\n    auto mainWindow = GetCurrentController()->WindowService()->CreateNativeWindow(INativeWindow::Normal);\r\n    mainWindow->SetTitle(L\"Connecting ...\");\r\n\r\n    GuiMainInvoker invoker;\r\n    remoteRenderer->RegisterMainWindow(mainWindow);\r\n    asyncChannel->SetInvokeInMainThread(&invoker);\r\n\r\n    GetCurrentController()->WindowService()->Run(mainWindow);\r\n\r\n    asyncChannel->SetInvokeInMainThread(nullptr);\r\n    remoteRenderer->UnregisterMainWindow();\r\n}\r\n\r\nint StartNamedPipeRemoteRenderer()\r\n{\r\n    auto jsonParser = Ptr(new glr::json::Parser);\r\n    auto networkClient = Ptr(new inter_process::NamedPipeClient(L\"GacUIRemoteProtocolNamedPipe\"));\r\n\r\n    GuiRemoteProtocolChannelClient channelClient(networkClient, jsonParser);\r\n    GuiRemoteProtocolAsyncJsonChannelRenderer asyncRendererChannel(channelClient.GetProtocolChannel());\r\n    GuiRemoteRendererSingle renderer(true);\r\n    GuiRemoteProtocolRendererChannel rendererChannel(\r\n        &channelClient,\r\n        &asyncRendererChannel,\r\n        &renderer);\r\n\r\n    channelClient.WaitForServer();\r\n\r\n    remoteRenderer = &renderer;\r\n    asyncChannel = &asyncRendererChannel;\r\n    auto result = SetupRawWindowsDirect2DRenderer();\r\n    asyncChannel = nullptr;\r\n    remoteRenderer = nullptr;\r\n    return result;\r\n}",
            "language": "c++"
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            GuiRemoteProtocolAsyncJsonChannelRenderer queues messages from the channel and runs them on the UI thread through IGuiRemoteProtocolAsyncRendererInvoker.\n            GuiRemoteProtocolRendererChannel converts JSON channel packages to calls on GuiRemoteRendererSingle,\n            and converts renderer events back to JSON packages for the core client id.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            Override GuiRemoteProtocolChannelClient::OnReadError, OnLocalError, or OnDisconnected\n            when the renderer should show a fatal error dialog or call GuiRemoteRendererSingle::ForceExitByFatelError.\n            See "
          },
          {
            "kind": "PageLink",
            "href": "https://github.com/vczh-libraries/GacUI/tree/master/Test/GacUISrc/RemotingTest_Rendering_Win32",

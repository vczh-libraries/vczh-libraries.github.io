              ]
            }
          ]
        },
        {

};
  const article = {
  "index": true,
  "numberBeforeTitle": false,
  "topic": {
    "kind": "Topic",
    "title": "Hosted Mode and Remote Protocol",
    "content": [
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            Using "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "SetupHostedWindowsGDIRenderer"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " or "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "SetupHostedWindowsDirect2DRenderer"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " instead of "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "SetupWindowsGDIRenderer"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " or "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "SetupWindowsDirect2DRenderer"
              }
            ]
          },
          {
            "kind": "Text",
            "text": "\n            runs a GacUI application in hosted mode.\n            A hosted mode GacUI application will start only one OS native window,\n            other windows are rendered inside it virtually.\n            System dialogs will be replaced by predefined GacUI implemented dialogs by default,\n            so that anything will be strictly inside the OS native window.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            Using "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "SetupRemoteNativeController"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " runs a GacUI application with remote protocol (forced in hosted mode),\n            which becomes headless,\n            instead of render anything on the screen,\n            it sends out rendering commands to a remote client.\n            This part will be covered in "
          },
          {
            "kind": "PageLink",
            "href": "/gacui/modes/remote_core.html",
            "content": [
              {
                "kind": "Text",
                "text": "Remote Protocol Core Application"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ".\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            If you want a remote protocol renderer that still work with other components of GacUI,\n            "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "GuiRemoteRendererSingle"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " implements everything that the remote protocol needs and starts a window,\n            displaying anything from the core GacUI application,\n            with user interactions covered.\n            This part will be covered in "
          },
          {
            "kind": "PageLink",
            "href": "/gacui/modes/remote_client.html",
            "content": [
              {
                "kind": "Text",
                "text": "Remote Protocol Client Application"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ".\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The "
          },
          {
            "kind": "PageLink",
            "href": "https://github.com/vczh-libraries/GacJS",
            "content": [
              {
                "kind": "Text",
                "text": "GacJS"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " also implements a GacUI renderer in a browser,\n            connecting to a GacUI application via HTTP protocol.\n            But the HTTP protocol implementation is not official,\n            it is for demo only,\n            no security guarantee is provided.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            GacUI provides a JSON channel layer for the remote protocol,\n            implemented with "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "vl::inter_process"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ".\n            A C++ core application usually starts a "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "GuiRemoteProtocolNetworkChannelServer"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ",\n            connects itself through "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "GuiRemoteProtocolLocalChannelClient"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ",\n            and waits for a renderer connected through "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "GuiRemoteProtocolChannelClient"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ".\n            The underlying data-transmission implementation is still selected by the application.\n            Current Windows examples use:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Strong",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "vl::inter_process::NamedPipeServer"
                      }
                    ]
                  },
                  {
                    "kind": "Text",
                    "text": " and "
                  },
                  {
                    "kind": "Strong",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "vl::inter_process::NamedPipeClient"
                      }
                    ]
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Strong",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "vl::inter_process::HttpServer"
                      }
                    ]
                  },
                  {
                    "kind": "Text",
                    "text": " and "
                  },
                  {
                    "kind": "Strong",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "vl::inter_process::HttpClient"
                      }
                    ]
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            A different data-transmission implementation should be added by implementing the "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "vl::inter_process"
              }
            ]
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "INetworkProtocolConnection"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ", "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "INetworkProtocolCallback"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ", "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "INetworkProtocolClient"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " and "
          },
          {
            "kind": "Strong",
            "content": [
              {
                "kind": "Text",
                "text": "INetworkProtocolServer"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " interfaces.\n            They are named network protocol interfaces, but the implementation does not have to be a network protocol;\n            stdio, DLL function calls, shared memory, sockets or any other message transport can fit this layer.\n            so the GacUI JSON channel classes can stay unchanged.\n            This part will be covered in "
          },
          {
            "kind": "PageLink",
            "href": "/gacui/modes/remote_communication.html",
            "content": [
              {
                "kind": "Text",
                "text": "Remote Protocol Channel Layer"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ".\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The complete Windows test projects are\n            "
          },
          {
            "kind": "PageLink",
            "href": "https://github.com/vczh-libraries/GacUI/tree/master/Test/GacUISrc/RemotingTest_Core",
            "content": [
              {
                "kind": "Text",
                "text": "RemotingTest_Core"
              }
            ]
          },
          {
            "kind": "Text",
            "text": " and\n            "
          },
          {
            "kind": "PageLink",
            "href": "https://github.com/vczh-libraries/GacUI/tree/master/Test/GacUISrc/RemotingTest_Rendering_Win32",
            "content": [
              {
                "kind": "Text",
                "text": "RemotingTest_Rendering_Win32"
              }
            ]
          },
          {
            "kind": "Text",
            "text": ".\n            They show the current named pipe and HTTP setup.\n        "
          }
        ]
      }
    ]
  }
};
  window["MVC-Resources.mvcModel"] = mvcModel;
  window["MVC-Resources.mvcViews"] = mvcViews;
  window["MVC-Resources.hrefPrefix"] = hrefPrefix;

    window[view.viewName].renderView(mvcModel, document.getElementById(view.targetObject));
  }

    eval(
      "(function(){" + scriptTag.innerHTML + "})()"

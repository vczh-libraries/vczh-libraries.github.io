<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>macOS -- GPU Accelerated C++ User Interface (vczh)</title>
<link rel="shortcut icon" href="/doc/current/favicon.ico" />
<link rel="stylesheet" type="text/css" href="/doc/current/global.css" />
<link rel="stylesheet" type="text/css" href="/doc/current/article.css" />
<script src="/doc/current/scripts/rootView.js"></script>
<script src="/doc/current/scripts/directoryView.js"></script>
<script src="/doc/current/scripts/articleView.js"></script>

</head>
<body>
<div id="MVC-ViewContainer"></div>
<script lang="javascript">
{
  const mvcModel = {
  "path": [
    "coding-agent",
    "installing",
    "macos"
  ]
};
  const mvcViews = [
  {
    "targetObject": "MVC-ViewContainer",
    "viewName": "Gaclib-RootView"
  },
  {
    "targetObject": "rootViewContainer",
    "viewName": "Gaclib-DirectoryView"
  },
  {
    "targetObject": "directoryViewContainer",
    "viewName": "Gaclib-ArticleView"
  }
];
  const hrefPrefix = "/doc/current";
  const directoryInfo = {
  "subNodes": [
    {
      "icon": "-",
      "name": "Working with Coding Agent",
      "selected": false,
      "path": [
        "coding-agent",
        "home"
      ],
      "subNodes": [
        {
          "icon": " ",
          "name": "Installing required tools",
          "selected": false,
          "subNodes": [
            {
              "icon": " ",
              "name": "Windows",
              "selected": false,
              "path": [
                "coding-agent",
                "installing",
                "windows"
              ]
            },
            {
              "icon": " ",
              "name": "Linux",
              "selected": false,
              "path": [
                "coding-agent",
                "installing",
                "linux"
              ]
            },
            {
              "icon": " ",
              "name": "macOS",
              "selected": true,
              "path": [
                "coding-agent",
                "installing",
                "macos"
              ]
            }
          ]
        }
      ]
    }
  ]
};
  const article = {
  "index": true,
  "numberBeforeTitle": false,
  "topic": {
    "kind": "Topic",
    "title": "Installing Required Tools on macOS",
    "content": [
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            (to be editing...)\n        "
          }
        ]
      }
    ]
  }
};
  window["MVC-Resources.mvcModel"] = mvcModel;
  window["MVC-Resources.mvcViews"] = mvcViews;
  window["MVC-Resources.hrefPrefix"] = hrefPrefix;
  window["MVC-Resources.directoryInfo"] = directoryInfo;
  window["MVC-Resources.article"] = article;
  for (const view of mvcViews) {
    window[view.viewName].renderView(mvcModel, document.getElementById(view.targetObject));
  }
  const renderedScriptTags = document.getElementById("MVC-ViewContainer").getElementsByTagName("script");
  for (const scriptTag of renderedScriptTags) {
    eval(
      "(function(){" + scriptTag.innerHTML + "})()"
    );
  }
}
</script>
</body>
</html>

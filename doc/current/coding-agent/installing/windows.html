<script lang="javascript">
{
  const mvcModel = {

};
  const mvcViews = [

  },
  {

    "viewName": "Gaclib-DirectoryView"
  },

    "viewName": "Gaclib-ArticleView"
  }
];
  const hrefPrefix = "/doc/current";
  const directoryInfo = {
  "subNodes": [
    {
      "icon": "-",
      "name": "Working with Coding Agent",
      "selected": false,
      "path": [
        "coding-agent",
        "home"

      "subNodes": [
        {
          "icon": " ",

          "selected": false,
          "subNodes": [
            {
              "icon": " ",

              "selected": true,
              "path": [
                "coding-agent",
                "installing",
                "windows"
              ]
            },
            {
              "icon": " ",
              "name": "Linux",
              "selected": false,
              "path": [
                "coding-agent",
                "installing",
                "linux"
              ]
            },
            {
              "icon": " ",

              "selected": false,
              "path": [
                "coding-agent",
                "installing",
                "macos"
              ]
            }
          ]
        }
      ]
    }
  ]
};
  const article = {
  "index": true,
  "numberBeforeTitle": false,
  "topic": {
    "kind": "Topic",
    "title": "Installing Required Tools on Windows",
    "content": [
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            The Windows agent scripts build with MSBuild through Visual Studio's developer environment and debug with CDB.\n            Install Visual Studio with the C++ desktop workload, a Windows SDK, and the Windows debugging tools that provide "
          },
          {
            "kind": "Name",
            "text": "cdb.exe"
          },
          {
            "kind": "Text",
            "text": ".\n            If CDB is not available, install the Windows Driver Kit or the Windows debugging tools component from the Visual Studio Installer.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            Define these environment variables before asking the agent to build or debug:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Name",
                    "text": "VLPP_VSDEVCMD_PATH"
                  },
                  {
                    "kind": "Text",
                    "text": ": absolute path to "
                  },
                  {
                    "kind": "Name",
                    "text": "VsDevCmd.bat"
                  },
                  {
                    "kind": "Text",
                    "text": ", for example "
                  },
                  {
                    "kind": "Name",
                    "text": "C:\\Program Files\\Microsoft Visual Studio\\2022\\Community\\Common7\\Tools\\VsDevCmd.bat"
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Name",
                    "text": "CDBPATH"
                  },
                  {
                    "kind": "Text",
                    "text": ": absolute path to "
                  },
                  {
                    "kind": "Name",
                    "text": "cdb.exe"
                  },
                  {
                    "kind": "Text",
                    "text": ", for example "
                  },
                  {
                    "kind": "Name",
                    "text": "C:\\Program Files (x86)\\Windows Kits\\10\\Debuggers\\x64\\cdb.exe"
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            After copying the Release "
          },
          {
            "kind": "Name",
            "text": ".github"
          },
          {
            "kind": "Text",
            "text": " folder, the agent should use these scripts instead of calling tools directly:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Name",
                    "text": ".github\\Scripts\\copilotBuild.ps1"
                  },
                  {
                    "kind": "Text",
                    "text": ": builds the solution found from "
                  },
                  {
                    "kind": "Name",
                    "text": "Project.md"
                  },
                  {
                    "kind": "Text",
                    "text": " context and writes "
                  },
                  {
                    "kind": "Name",
                    "text": "Build.log"
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Name",
                    "text": ".github\\Scripts\\copilotExecute.ps1"
                  },
                  {
                    "kind": "Text",
                    "text": ": runs unit-test or CLI projects and writes "
                  },
                  {
                    "kind": "Name",
                    "text": "Execute.log"
                  },
                  {
                    "kind": "Text",
                    "text": " for unit tests."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Name",
                    "text": ".github\\Scripts\\copilotDebug_Start.ps1"
                  },
                  {
                    "kind": "Text",
                    "text": " and "
                  },
                  {
                    "kind": "Name",
                    "text": "copilotDebug_RunCommand.ps1"
                  },
                  {
                    "kind": "Text",
                    "text": ": start CDB and send debugger commands."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            If the application uses the tools shipped by Release, build them from the Release repository:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Open "
                  },
                  {
                    "kind": "Name",
                    "text": "Tools\\Executables\\Executables.sln"
                  },
                  {
                    "kind": "Text",
                    "text": " in Visual Studio."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Build "
                  },
                  {
                    "kind": "Name",
                    "text": "Release"
                  },
                  {
                    "kind": "Text",
                    "text": " with "
                  },
                  {
                    "kind": "Name",
                    "text": "x64"
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Run "
                  },
                  {
                    "kind": "Name",
                    "text": "Tools\\CopyExecutables.ps1"
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "Confirm "
                  },
                  {
                    "kind": "Name",
                    "text": "CodePack.exe"
                  },
                  {
                    "kind": "Text",
                    "text": ", "
                  },
                  {
                    "kind": "Name",
                    "text": "CppMerge.exe"
                  },
                  {
                    "kind": "Text",
                    "text": ", "
                  },
                  {
                    "kind": "Name",
                    "text": "GacGen.exe"
                  },
                  {
                    "kind": "Text",
                    "text": ", and "
                  },
                  {
                    "kind": "Name",
                    "text": "GlrParserGen.exe"
                  },
                  {
                    "kind": "Text",
                    "text": " exist in "
                  },
                  {
                    "kind": "Name",
                    "text": "Release\\Tools"
                  },
                  {
                    "kind": "Text",
                    "text": "."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            For debugger readability, copy "
          },
          {
            "kind": "Name",
            "text": "Import\\vlpp.natvis"
          },
          {
            "kind": "Text",
            "text": " from Release to Visual Studio's visualizers folder.\n            The CDB startup script also loads the natvis file for debugger commands such as "
          },
          {
            "kind": "Name",
            "text": "dx"
          },
          {
            "kind": "Text",
            "text": ".\n        "
          }
        ]
      }
    ]
  }
};
  window["MVC-Resources.mvcModel"] = mvcModel;
  window["MVC-Resources.mvcViews"] = mvcViews;
  window["MVC-Resources.hrefPrefix"] = hrefPrefix;
  window["MVC-Resources.directoryInfo"] = directoryInfo;
  window["MVC-Resources.article"] = article;
  for (const view of mvcViews) {
    window[view.viewName].renderView(mvcModel, document.getElementById(view.targetObject));
  }
  const renderedScriptTags = document.getElementById("MVC-ViewContainer").getElementsByTagName("script");
  for (const scriptTag of renderedScriptTags) {
    eval(
      "(function(){" + scriptTag.innerHTML + "})()"
    );
  }

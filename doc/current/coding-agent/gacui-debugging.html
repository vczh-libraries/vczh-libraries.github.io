  const article = {
  "index": true,
  "numberBeforeTitle": false,
  "topic": {
    "kind": "Topic",
    "title": "AutomationService and Basic Computer Use",
    "content": [
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            GacUI applications need an application-level automation path so a coding agent can inspect and operate the UI while debugging.\n            On Windows, the recommended path is to start the GacUI AutomationService HTTP endpoint from the application during startup.\n            This lets the agent read the control tree or remote-renderer DOM and send IO commands without using operating-system UI Automation.\n        "
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            From the agent user's perspective, this means:\n            "
          },
          {
            "kind": "List",
            "ordered": false,
            "items": [
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "The application should expose a stable localhost automation URL while it is running."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "The agent should use the automation endpoint for normal GacUI windows and controls."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "The agent should not rely on UI Automation as a fallback, because it can fail when the screen is locked."
                  }
                ]
              },
              {
                "kind": "ContentListItem",
                "content": [
                  {
                    "kind": "Text",
                    "text": "The user can keep using the computer because the agent does not need to drive the physical pointer for normal GacUI operations."
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Paragraph",
        "content": [
          {
            "kind": "Text",
            "text": "\n            See "
          },
          {
            "kind": "PageLink",

            "content": [
              {
                "kind": "Text",

              }
            ]
          },
          {
            "kind": "Text",
            "text": " for the service setup, exact HTTP URLs, setup-function cases, and platform implementation details.\n        "
          }
        ]
      },
      {
        "kind": "Topic",
        "title": "When the Agent Gets Blocked",
        "content": [
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                Application-level automation depends on the application UI thread.\n                A native crash dialog, message box, file dialog, color dialog, or another modal native window can block that thread.\n                When this happens, the agent should stop polling the application automation endpoint and inspect native windows from another process.\n            "
              }
            ]
          },
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                The copied "
              },
              {
                "kind": "Name",
                "text": ".github/Guidelines/Running-ComputerUse.md"
              },
              {
                "kind": "Text",
                "text": " file explains the unblocking workflow:\n                "
              },
              {
                "kind": "List",
                "ordered": false,
                "items": [
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "Identify the target process."
                      }
                    ]
                  },
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "Enumerate top-level and child windows with Win32 APIs."
                      }
                    ]
                  },
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "Read class names, window text, control ids, and rectangles."
                      }
                    ]
                  },
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "Prefer direct control messages such as "
                      },
                      {
                        "kind": "Name",
                        "text": "BM_CLICK"
                      },
                      {
                        "kind": "Text",
                        "text": ", "
                      },
                      {
                        "kind": "Name",
                        "text": "WM_SETTEXT"
                      },
                      {
                        "kind": "Text",
                        "text": ", and combo-box messages."
                      }
                    ]
                  },
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "Capture a screenshot only when visual confirmation is needed."
                      }
                    ]
                  },
                  {
                    "kind": "ContentListItem",
                    "content": [
                      {
                        "kind": "Text",
                        "text": "Close or answer the native dialog before returning to AutomationService."
                      }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      },
      {
        "kind": "Topic",
        "title": "Project Preparation",
        "content": [
          {
            "kind": "Paragraph",
            "content": [
              {
                "kind": "Text",
                "text": "\n                If the application contains GacUI UI work, mention its automation endpoint in "
              },
              {
                "kind": "Name",
                "text": "Project.md"
              },
              {
                "kind": "Text",
                "text": ".\n                Include the executable project name, port, URL prefix, whether hosted mode is used, and any native dialogs that commonly appear.\n                This gives the agent enough context to choose AutomationService first and native-window handling only when the application is blocked.\n            "
              }
            ]
          }
        ]
      }
    ]
  }
};

            "kind": "Name",

          },
          {
            "kind": "Text",
            "text": " is the repository map that tells the agent where to build, what to run, which generated files are protected, and which platform folders matter.\n            The Release copy only points to the GacUI example; an application repository should replace it with concrete project facts.\n        "
          }
        ]
      },
      {
        "kind": "Topic",
        "title": "Recommended Shape",

          {
            "kind": "Paragraph",

                "text": "\n                A useful "

                "kind": "Name",
                "text": "Project.md"
              },

                "kind": "Text",
                "text": " usually contains:\n                "
              },
              {
                "kind": "List",
                "ordered": false,
                "items": [

                    "kind": "ContentListItem",

                      {
                        "kind": "Text",

                        "kind": "Name",
                        "text": "SOLUTION-ROOT"

                      {
                        "kind": "Text",

                    "kind": "ContentListItem",

        "title": "Small Application Example",

            "kind": "Paragraph",

                "kind": "Text",
                "text": "\n                A small GacUI application can use this shape:\n                "
              },
              {
                "kind": "Program",
                "code": "# Project Specific Instruction\r\n\r\n## Solution to Work On\r\n\r\nYou are working on the solution `REPO-ROOT/App/App.sln`,\r\ntherefore `SOLUTION-ROOT` is `REPO-ROOT/App`.\r\n\r\n## Projects for Verification\r\n\r\nThe `REPO-ROOT/App/AppTests/AppTests.vcxproj` project is the unit test project.\r\nWhen any `*.h`, `*.cpp`, `*.xml`, or Workflow script file is changed, build the solution\r\nand run `AppTests`.\r\n\r\nThe `REPO-ROOT/App/App/App.vcxproj` project is the interactive GacUI application.\r\nRun it when the change affects windows, dialogs, command routing, or application startup.\r\n\r\n## Files not Allowed to Modify\r\n\r\nFiles in these folders are generated and must not be edited directly:\r\n- `REPO-ROOT/App/Generated`\r\n- `REPO-ROOT/App/Resources/Compiled`\r\n\r\nFix the source resource or generator input instead.\r\n\r\n## Code Generation\r\n\r\nIf `REPO-ROOT/App/Resources/*.xml` changes, run `GacGen` through the project build.\r\nIf generated files change, rebuild and run `AppTests`.\r\n\r\n## Linux Specific\r\n\r\nThis repository has no Linux build for the application.\r\nDo not try to create one unless the task explicitly asks for it.",

              }

        "kind": "Topic",

            "kind": "Paragraph",

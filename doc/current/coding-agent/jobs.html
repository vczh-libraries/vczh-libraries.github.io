          },

          },
          {
            "kind": "Name",
            "text": ".github/prompts"

                        "kind": "Text",

                    "kind": "ContentListItem",

                        "kind": "Name",

                  }

              }

            "kind": "Paragraph",
            "content": [

                "kind": "Text",

                "text": ".github/TaskLogs/Copilot_Investigate.md"

        "content": [

                "kind": "Text",

                "kind": "Name",
                "text": "refine"

                "kind": "Text",

                "kind": "List",

                    "kind": "ContentListItem",

                      {

                  },

                    "kind": "ContentListItem",

            "content": [

                "text": "\n                The refine job is intentionally document-only.\n                It should not modify source code.\n                It is useful when a correction, review discussion, or debugging result should influence future agent behavior.\n            "
              }
            ]
          }
        ]
      },
      {
        "kind": "Topic",
        "title": "Other Keywords",
        "content": [
          {

              {
                "kind": "Name",
                "text": "kb"

              {
                "kind": "Text",
                "text": " for drafting or updating knowledge-base documents.\n                If a user request does not start with a known keyword, the root instructions classify ordinary coding work as an "

              {
                "kind": "Name",
                "text": "investigate repro"
              },
              {
                "kind": "Text",
                "text": " style task.\n            "
              }
            ]
          }
        ]
      }
    ]

};

  window["MVC-Resources.mvcViews"] = mvcViews;
  window["MVC-Resources.hrefPrefix"] = hrefPrefix;
  window["MVC-Resources.directoryInfo"] = directoryInfo;
  window["MVC-Resources.article"] = article;

    window[view.viewName].renderView(mvcModel, document.getElementById(view.targetObject));
  }
  const renderedScriptTags = document.getElementById("MVC-ViewContainer").getElementsByTagName("script");
  for (const scriptTag of renderedScriptTags) {
    eval(
      "(function(){" + scriptTag.innerHTML + "})()"
    );
  }
}
</script>

</html>
